  <script>
    function createParticle() {
      const p = document.createElement('div');
      p.style.width = Math.random() * 5 + 2 + 'px';
      p.style.height = p.style.width;
      p.style.position = 'fixed';
      p.style.background = '#00e5ff';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.top = '-20px';
      p.style.opacity = Math.random() * 0.3 + 0.2; /* 透明度も少し下げて目に優しく */
      p.style.pointerEvents = 'none';
      p.style.zIndex = '999';
      p.style.transform = `rotate(${Math.random() * 360}deg)`;
      document.body.appendChild(p);

      let y = -20;
      let x = parseFloat(p.style.left);
      /* ✨ スピードを以前の半分（1.0〜2.0 → 0.5〜1.0）程度に抑制 */
      let speed = Math.random() * 0.5 + 0.5;
      let drift = Math.random() * 0.3 - 0.15;

      const animation = setInterval(() => {
        y += speed;
        x += drift;
        p.style.top = y + 'px';
        p.style.left = x + 'vw';
        
        if (y > window.innerHeight) {
          clearInterval(animation);
          p.remove();
        }
      }, 30);
    }

    setInterval(createParticle, 400); /* 生成間隔も少し広げて落ち着かせました */
  </script>
